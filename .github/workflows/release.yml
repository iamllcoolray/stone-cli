name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe to get the tag

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # uses whatever version is in your go.mod

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true   # auto-generates notes from commits since last tag
          files: |
            dist/*.zip
            dist/checksums.sha256
            install.sh
